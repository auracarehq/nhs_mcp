name: Build and Deploy NHS Scraper

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: acrclinicalapi.azurecr.io
  IMAGE_NAME: nhs-scraper
  CONTAINER_APP: ca-nhs-scraper-dev
  RESOURCE_GROUP: rg-app-dev-uksouth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image via ACR Tasks
        run: |
          az acr build \
            --registry acrclinicalapi \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile \
            .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
