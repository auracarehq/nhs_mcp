name: Build and Deploy NHS Scraper

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ca-nhs-scraper-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: acrclinicalapi.azurecr.io
  IMAGE_NAME: nhs-scraper
  CONTAINER_APP: ca-nhs-scraper-dev
  RESOURCE_GROUP: rg-app-dev-uksouth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image via ACR Tasks
        run: |
          az acr build \
            --registry acrclinicalapi \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile \
            .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}"
